<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advertising Banner</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #111; /* dark background */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .ad-container {
    width: 90%;
    height: 200px;
    background-color: #222;
    border: 2px solid #3498db;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .ad-container iframe {
    width: 100%;
    height:300px;
    border: none;
  }
</style>
</head>
<body>

<div class="ad-container">
  <!-- Iframe para sa advertising content -->
  <iframe src="ads.html"></iframe>
</div>

</body>
</html>
