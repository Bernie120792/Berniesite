<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bernie Client Page</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 50px; background: #f2f2f2; }
.box { background: white; padding: 20px; border-radius: 10px; width: 300px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<div class="box">
<h1 id="clientName">Client Page</h1>
<p>Welcome to your personal page</p>
<button onclick="alert('Hello client!')">Click Me</button>
</div>

<script>
// Kuhanin ang URL parameter ?client=
const params = new URLSearchParams(window.location.search);
const client = params.get("client");

// Palitan ang heading depende sa client
if(client){
    document.getElementById("clientName").innerText = "Welcome " + client;
}
</script>

</body>
</html>
