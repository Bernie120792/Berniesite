<!DOCTYPE html>
<html lang="tl">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Budget Tracker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    touch-action:manipulation;
    overscroll-behavior:none;
}

body{
    font-family:Arial;
    background:#eef2f7;
    padding:15px;
}

.container{
    max-width:700px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
    color:#111827;
}

/* OFFLINE PAGE */
.offline-page{
    display:none;
    text-align:center;
    padding:40px 20px;
}

.offline-page h1{
    font-size:70px;
}

.offline-page h2{
    margin-top:10px;
    color:#111827;
}

.offline-page p{
    margin-top:10px;
    color:#6b7280;
}

/* SUMMARY */
.summary-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:15px;
}

.box{
    padding:15px;
    border-radius:16px;
    color:white;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.box h3{
    font-size:13px;
    opacity:0.9;
}

.box p{
    font-size:20px;
    font-weight:bold;
    margin-top:5px;
}

.budget-box{
    background:#2563eb;
}

.expense-box{
    background:#ef4444;
}

.remaining-box{
    background:#10b981;
}

/* FORM */
.form-box{
    background:white;
    padding:18px;
    border-radius:16px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    margin-bottom:15px;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
    outline:none;
}

input:focus{
    border:1px solid #2563eb;
}

button{
    background:#111827;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:active{
    transform:scale(0.98);
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

/* SPINNER */
.spinner{
    display:none;
    width:18px;
    height:18px;
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid white;
    border-radius:50%;
    animation:spin 0.7s linear infinite;
    margin:auto;
}

@keyframes spin{

0%{
    transform:rotate(0deg);
}

100%{
    transform:rotate(360deg);
}

}

/* HISTORY */
.history-box{
    background:white;
    padding:15px;
    border-radius:16px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.history-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 5px;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.history-item:last-child{
    border-bottom:none;
}

.action-buttons{
    display:flex;
    gap:5px;
    justify-content:flex-end;
}

.small-btn{
    padding:5px 8px;
    border:none;
    border-radius:6px;
    color:white;
    font-size:12px;
    cursor:pointer;
    width:auto;
    margin-top:0;
}

.edit-btn{
    background:#2563eb;
}

.delete-btn{
    background:#dc2626;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-box{
    background:white;
    padding:20px;
    border-radius:15px;
    width:320px;
    text-align:center;
    animation:popup 0.2s ease;
}

@keyframes popup{

from{
    transform:scale(0.8);
    opacity:0;
}

to{
    transform:scale(1);
    opacity:1;
}

}

.modal-buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.modal-buttons button{
    flex:1;
    padding:10px;
}

.yes{
    background:#16a34a;
}

.no{
    background:#dc2626;
}

#status{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:green;
}

@media(max-width:600px){

.summary-grid{
    grid-template-columns:repeat(3,1fr);
    gap:6px;
}

.box{
    padding:10px;
}

.box h3{
    font-size:11px;
}

.box p{
    font-size:15px;
}

.title{
    font-size:24px;
}

input,button{
    font-size:14px;
}

}

</style>
</head>

<body>

<!-- OFFLINE PAGE -->
<div id="offlinePage" class="offline-page">

<h1>📡</h1>

<h2>No Internet Connection</h2>

<p>
Please connect to internet
</p>

</div>

<!-- MAIN APP -->
<div id="mainApp">

<div class="container">

<div class="title">
💰 WEEKLY BUDGET TRACKER
</div>

<!-- SUMMARY -->
<div class="summary-grid">

<div class="box budget-box">
<h3>Budget</h3>
<p>₱<span id="budget">0</span></p>
</div>

<div class="box expense-box">
<h3>Gastos</h3>
<p>₱<span id="expense">0</span></p>
</div>

<div class="box remaining-box">
<h3>Natitira</h3>
<p>₱<span id="remaining">0</span></p>
</div>

</div>

<!-- FORM -->
<div class="form-box">

<input
type="number"
id="budgetInput"
placeholder="Enter Budget">

<button onclick="openModal()">
SAVE BUDGET
</button>

<input
type="text"
id="item"
placeholder="Gastos">

<input
type="number"
id="amount"
placeholder="Halaga">

<button id="expenseBtn"
onclick="saveExpense()">

<span id="btnText">
ADD GASTOS
</span>

<span id="spinner"
class="spinner">
</span>

</button>

<div id="status"></div>

</div>

<!-- HISTORY -->
<div class="history-box">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
gap:10px;
flex-wrap:wrap;
">

<h3>📜 History</h3>

<div style="
display:flex;
gap:8px;
">

<button
onclick="copyHistory()"
style="
width:auto;
padding:8px 12px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
font-size:12px;
font-weight:bold;
margin-top:0;
">
COPY
</button>

<button
onclick="deleteAllExpenses()"
style="
width:auto;
padding:8px 12px;
background:#b91c1c;
border:none;
border-radius:8px;
color:white;
font-size:12px;
font-weight:bold;
margin-top:0;
">
DELETE ALL
</button>

</div>

</div>

<div id="historyList"></div>

</div>

</div>

</div>

<!-- SAVE BUDGET MODAL -->
<div class="modal" id="modal">

<div class="modal-box">

<h3>
Are you sure to change your current budget?
</h3>

<div class="modal-buttons">

<button class="yes"
onclick="confirmBudget()">
YES
</button>

<button class="no"
onclick="closeModal()">
NO
</button>

</div>

</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw5bw3TLd8pogtQ8kMI7n8Lz0n3A8RzhxBpSm8ZV1fwds0Ge7vGrclI-VkSV0jpZEjQ/exec";

/* INTERNET CHECK */
function checkInternet(){

if(navigator.onLine){

document.getElementById("offlinePage").style.display =
"none";

document.getElementById("mainApp").style.display =
"block";

loadData();

}else{

document.getElementById("offlinePage").style.display =
"block";

document.getElementById("mainApp").style.display =
"none";

}

}

window.addEventListener("online",checkInternet);
window.addEventListener("offline",checkInternet);

checkInternet();

/* CUSTOM MODAL */
function showModal(title,callback=null,type="alert",defaultValue=""){

const modal = document.createElement("div");

modal.style.position = "fixed";
modal.style.top = "0";
modal.style.left = "0";
modal.style.width = "100%";
modal.style.height = "100%";
modal.style.background = "rgba(0,0,0,0.5)";
modal.style.display = "flex";
modal.style.justifyContent = "center";
modal.style.alignItems = "center";
modal.style.zIndex = "9999";

let inputHTML = "";

if(type === "prompt"){

inputHTML = `
<input id="modalInput"
value="${defaultValue}"
style="
width:100%;
padding:12px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
">
`;

}

modal.innerHTML = `

<div style="
background:white;
padding:20px;
border-radius:15px;
width:320px;
animation:popup 0.2s ease;
text-align:center;
">

<h3 style="
margin-bottom:10px;
color:#111827;
">
${title}
</h3>

${inputHTML}

<div style="
display:flex;
gap:10px;
margin-top:15px;
">

<button id="okBtn"
style="
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#16a34a;
color:white;
font-weight:bold;
">
OK
</button>

<button id="cancelBtn"
style="
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#dc2626;
color:white;
font-weight:bold;
">
Cancel
</button>

</div>

</div>

`;

document.body.appendChild(modal);

document.getElementById("okBtn")
.onclick = function(){

let value = true;

if(type === "prompt"){

value =
document.getElementById("modalInput").value;

}

document.body.removeChild(modal);

if(callback){
callback(value);
}

};

document.getElementById("cancelBtn")
.onclick = function(){

document.body.removeChild(modal);

};

}

/* LOAD DATA */
function loadData(){

fetch(SCRIPT_URL)
.then(res => res.json())
.then(data => {

document.getElementById("budget").innerText =
data.budget || 0;

document.getElementById("expense").innerText =
data.expense || 0;

document.getElementById("remaining").innerText =
data.remaining || 0;

let list =
document.getElementById("historyList");

list.innerHTML = "";

if(!data.history || data.history.length === 0){

list.innerHTML =
"<p style='text-align:center;color:gray;'>No history yet</p>";

return;

}

data.history.reverse().forEach(h => {

list.innerHTML += `

<div class="history-item">

<div>
<b>${h.item}</b>
</div>

<div style="text-align:right;">

<div style="
color:red;
font-weight:bold;
margin-bottom:5px;">
₱${h.amount}
</div>

<div class="action-buttons">

<button
class="small-btn edit-btn"
onclick="editExpense(${h.row},${h.amount})">
Edit
</button>

<button
class="small-btn delete-btn"
onclick="deleteExpense(${h.row})">
Delete
</button>

</div>

</div>

</div>

`;

});

})
.catch(err => {

document.getElementById("status").innerText =
"Connection Error";

});

}

function openModal(){

let b =
document.getElementById("budgetInput").value;

if(b == ""){

showModal("Enter budget");
return;

}

document.getElementById("modal").style.display =
"flex";

}

function closeModal(){

document.getElementById("modal").style.display =
"none";

}

function confirmBudget(){

let budget =
document.getElementById("budgetInput").value;

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"budget",
budget:budget
})
})
.then(r => r.text())
.then(d => {

document.getElementById("status").innerText =
"Budget Updated";

document.getElementById("budgetInput").value = "";

closeModal();

loadData();

});

}

let isSavingExpense = false;

function saveExpense(){

if(isSavingExpense){
return;
}

let item =
document.getElementById("item").value;

let amount =
document.getElementById("amount").value;

if(item == "" || amount == ""){

showModal("Complete all fields");
return;

}

isSavingExpense = true;

let btn =
document.getElementById("expenseBtn");

btn.disabled = true;

document.getElementById("btnText").style.display =
"none";

document.getElementById("spinner").style.display =
"inline-block";

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"expense",
item:item,
amount:amount
})
})
.then(r => r.text())
.then(d => {

document.getElementById("status").innerText =
"Saved";

document.getElementById("item").value = "";
document.getElementById("amount").value = "";

loadData();

})
.finally(()=>{

isSavingExpense = false;

btn.disabled = false;

document.getElementById("btnText").style.display =
"inline";

document.getElementById("spinner").style.display =
"none";

});

}

function editExpense(row,currentAmount){

showModal(
"Edit Amount",
function(newAmount){

if(newAmount == ""){
return;
}

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"editExpense",
row:row,
amount:newAmount
})
})
.then(r=>r.text())
.then(d=>{

document.getElementById("status").innerText =
"Expense Updated";

loadData();

});

},
"prompt",
currentAmount
);

}

function deleteExpense(row){

showModal(
"Enter MPIN to delete",
function(mpin){

if(mpin !== "1207"){

showModal("Wrong MPIN");
return;

}

showModal(
"Delete this expense?",
function(){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"deleteExpense",
row:row
})
})
.then(r=>r.text())
.then(d=>{

document.getElementById("status").innerText =
"Expense Deleted";

loadData();

});

}
);

},
"prompt"
);

}

function deleteAllExpenses(){

showModal(
"Enter MPIN to delete all",
function(mpin){

if(mpin !== "1207"){

showModal("Wrong MPIN");
return;

}

showModal(
"Delete ALL expenses?",
function(){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"deleteAll"
})
})
.then(r=>r.text())
.then(d=>{

document.getElementById("status").innerText =
"All Expenses Deleted";

loadData();

});

}
);

},
"prompt"
);

}

function copyHistory(){

let budget =
document.getElementById("budget").innerText;

let expense =
document.getElementById("expense").innerText;

let remaining =
document.getElementById("remaining").innerText;

let historyItems =
document.querySelectorAll(".history-item");

let text =
"💰 WEEKLY BUDGET TRACKER\n\n";

text +=
"Budget: ₱" + budget + "\n";

text +=
"Gastos: ₱" + expense + "\n";

text +=
"Natitira: ₱" + remaining + "\n\n";

text += "📜 HISTORY\n\n";

if(historyItems.length === 0){

text += "No history yet";

}else{

historyItems.forEach(item => {

let name =
item.querySelector("b").innerText;

let amount =
item.querySelector("div[style*='color:red']").innerText;

text +=
name + " - " + amount + "\n";

});

}

navigator.clipboard.writeText(text)
.then(()=>{

document.getElementById("status").innerText =
"History Copied";

})
.catch(()=>{

showModal("Failed to copy");

});

}

let lastTouchEnd = 0;

document.addEventListener("touchend", function(event){

let now = (new Date()).getTime();

if(now - lastTouchEnd <= 300){
event.preventDefault();
}

lastTouchEnd = now;

}, false);

</script>

</body>
</html>
